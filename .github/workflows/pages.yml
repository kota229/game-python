name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build site artifact (static, no build step)
        run: |
          mkdir -p _site
          # 静的サイトをそのまま公開する。参照用リポジトリ・開発用ファイルは除外。
          rsync -a --exclude '.git' --exclude 'reference' --exclude 'node_modules' \
                   --exclude '_site' --exclude 'scripts' --exclude 'test' \
                   ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
